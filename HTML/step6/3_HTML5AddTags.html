<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html5에서 새로 추가된 잔여 Tag</title>
</head>
<body>
    <figure>
        <img src="https://placehold.co/150" alt="undefined image">
        <figcaption>아직 정의되지 않은 이미지</figcaption>
        <!-- 
        !! 확정구조 !! img 쓰고, figcaption 쓰고 끝나야함
        figure : 흉상, 동상
        상징적인 의미를 담은 image의 경우 사용할 수 있는 tag (about us > ci 공간...)
        image의 비중 (무게)이 text보다 많이 느껴질 경우 사용 > 이미지가 더 중요한 느낌 글자는 이미지를 보조하는 느낌 (예 : 사람사진 / 제품 디자인 등)
        img tag의 alt대용으로 figcaption이 사용 가능함 (웹 접근성 측면에서도 좋음)
        -->
    </figure>

    <progress value="20" max="100"></progress>
    <meter value="80" min="10" max="100" low="20" high="90"></meter>80%
    
</body>
</html>
