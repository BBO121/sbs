<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hyper Link - 만능버튼</title>
     <style> 
        html, body, #targetAnchor{
            height: 100%;
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
    <h1>hyperlink List</h1>
    <p>
        hyperLink를 이용하여 원하는 url 및 url 내 위치로 이동하는 법, 그외 기타 다양한 버튼 액션을 배워보자.
    </p>
    <ul>
        <li><a href="https://naver.com" target="_blank">naver button</a></li>
        <li><a href="https://daum.net" target="_self">daum button</a></li>
            <!-- 
                < target 값 > 
                _self = 현재 시스템에서 세션을 유지해야 할 경우
                _blank = 세션을 유지할 필요가 없을 때 (아예 시스템이 바뀌는 상황) 새 탭으로 열어줘야함.
            -->
        <li><a href="../step2.zip">download button</a></li>
        <li><a href="mailto:ysarang3000@gmail.com?subject='문의남깁니다.'">email send button</a></li>
        <li><a href="tel:+821099559198">cell button</a></li>
        <li><a href="#targetAnchor">named Anchor button</a></li>
    </ul>

    <div id="targetAnchor">targetPosition</div>


    

<!-- _blank = 새탭으로 열리기 -->
    
</body>
</html>
