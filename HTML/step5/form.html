<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form - Input Tag's. 입력관련태그</title>
</head>
<body>
    <form action="">
        <!-- 
            form은 input내 data들을 담아 전송하는 역할을 수행한다.
            감싸지는 위치에 따라 input과 그외 나머지 정보들을 서버로 보낼 수 있다.
            전송방식에는 get/post 방식이 있다.
        -->
        <fieldset>
            <legend>HTML4 Input's</legend>
            <ul>
                <li>
                    <label for="cliID">사용자 아이디 :</label>
                    <input type="text" id="cliID">
                    <!-- 
                    Input - display : inline-block
                    id는 backEnd가 직접적으로 사용하는 속성이기 때문에 상호 협의하에 작성하거나 상식적인 선 내 web 상 naming 규칙을 따름
                        1. 한글, 띄어쓰기, 특문금지
                        2. 숫자나 대문자가 앞에 오면 안됨
                        3. 영문키워드 2개 이상을 조합히야함 (모든 언어에는 예약어 개념이 존재 = 이미 선점된 단어들)
                    만약 lable사용이 불가능 할 시에 title을 항시 제공해야 한다.
                    -->

                    <!-- type: text - 모든 문자를 다 담을수 있음 -->
                </li>
                <li>
                    <label for="cliPW">사용자 비밀번호 :</label>
                    <input type="password" id="cliPW">
                </li>
                <li>
                    <input type="radio" name="radioGroup" id="btn_radio1" checked>
                    <label for="btn_radio1">radio1</label>
                    <input type="radio" name="radioGroup" id="btn_radio2">
                    <label for="btn_radio2">radio2</label>
                    <input type="radio" name="radioGroup" id="btn_radio3">
                    <label for="btn_radio3">radio3</label>
                    <input type="radio" name="radioGroup" id="btn_radio4">
                    <label for="btn_radio4">radio4</label>
                    <!--
                        입력 태그 타입 radio는 라디오 버튼이며, name 을 같은 이름으로 여러 항목을 지정시 그룹화 된다. 또한 label을 이용하여 해당 항목과 버튼을 연결해줄 필요가 있다.
                        value 값설정으로 전달할 값을 넣어 둘 수 있으나, 비워두어도 상관없다.
                        checked 를 이용하여 페이지가 로드 될때 초기 선택값을 넣어 둘 수 있다.
                        그리고 cheackbox와는 달리 하나의 항목만 선택 가능하다.
                    -->
                        <!-- or컨디션 (이거나 조건) -->
                </li>
                <p>
                    <strong>(input:radio#btn_radio$[name='radioGroup']+label[for='btn_radio$]{radio$})*4</strong>
                </p>
                <li>
                    <input type="checkbox" id="btn_chk1">
                    <label for="btn_chk1">check1</label>
                    <input type="checkbox" id="btn_chk2">
                    <label for="btn_chk2">check2</label>
                    <input type="checkbox" id="btn_chk3">
                    <label for="btn_chk3">check3</label>
                    <input type="checkbox" id="btn_chk4">
                    <label for="btn_chk4">check4</label>
                    <!--
                        1. 입력태그타입 checkbox는 다중 선택을 지원 하는 input이며, label을 이용하여 해당 항목과 연결해야 한다.
                        2. value 값은 기존 input 과 동일
                        3. checked 옵션 역시 radio input 과 동일
                    -->
                </li>
                <p>
                    <strong>(input:checkbox#btn_chk$+label[for='btn_chk$']{check$})*4</strong>
                </p>
                <li>
                    <textarea title="하시고 싶은 말씀을 남겨주세요" cols="30" rows="10"></textarea>
                </li>
                <!-- 만약 lable사용이 불가능 할 시에 title을 항시 제공해야 한다. >>> title이 붙으면 사이트가 읽어줌. -->
                <!-- 
                    1.cols,rows attr은 css에서 사용해야함 (삭제하라는 뜻)
                    2.Tqg 입력불가 - 입력시 다양성 표현 불가
                    3. resize기능은 css에서 꺼야함
                    4. font역시 직접 지정해야만 변경됨
                -->
                <!-- 
                    여러줄을 입력 할 수 있는 텍스트 상자인 textarea는 cols로 가로 입력 너비, rows로 세로입력너비의 초기값을 설정할 수 있다.
                    주의사항은 pre와 마찬가지로 입력한 그대로를 보여주기 때문에, 초기 데이터 삽입시 공백부분에 유의해야한다.
                -->
                <li>
                    <label for="selectjob">직업 선택 :</label>
                    <select id="selectjob">
                        <optgroup label="구직자">
                            <option>무직</option>
                            <option>학생</option>
                        </optgroup>
                        <optgroup label="근로자">
                            <option>전문직</option>
                            <option>공무원</option>
                        </optgroup>
                    </select>
                <!-- 
                    select는 선택항목의 목록형 단축 메뉴 형식으로 만드는 입력 양식
                    항목 수 만큼의 option이 필요하고, 이 안의 value로 값을 전달한다.
                    optgroup으로 중간 그룹을 설정 할 수 있다.
                    radio, checkbox처럼 외형 변경이 어렵다.
                -->
                </li>
                <li>
                    <input type="image" src="https://placehold.co/150x50?text=button" alt="imgButton">
                        <!-- 1. image 는 버튼을 웹사이트 디자인에 맞게 디자인된 버튼을 사용할 때 사용 한다. -->
                    <input type="button" value="비밀번호확인">
                        <!-- 2. button 은 최종 확인 전송 및 페이지 양식 되돌리기, 파일 찾아보기 기능을 제외한 나머지 기능의 버튼 (우편번호, 검색, 추가, 삭제 등)에 사용한다. -->
                    <input type="file">
                        <!-- 3. file은 파일 찾아보기 버튼에 사용한다. -->
                    <input type="submit" value="전송">
                        <!-- 
                            4. summit은 해당 폼 내 모든 input의 유효성을 검수하고 전송을 담당
                            반드시 form 안에 위치해야함!!!!!
                        -->
                    <input type="reset" value="취소">
                        <!-- 
                            5. reset은 해당 폼의 모든 양식 내용을 초기화(아예 없는 상태) 시킬 때 사용한다.
                            반드시 form 안에 위치해야함!!!!!
                        -->
                    <button></button>
                    <!-- 모든 버튼타입 소화 가능한 버튼 / 안쪽에 tag 삽입도 가능, html5에서 태어난 태그, default : submit -->
                </li>
            </ul>
        </fieldset>
    </form>

    <form>
        <fieldset>
            <legend>HTML5 Input's</legend>
            <ul>
                <li>
                    <label for="userEmail">사용자 이메일 :</label>
                    <input type="email" id="userEmail" required readonly>
                    <!-- 
                        readonly : 읽기전용 (server에 저장이 된적이 있는 data를 불러오기) > 저장된적 있던 정보 > 아이디같은거
                        disabled : 비활성화 (입력자체를 막아 server에 저장 자체가 불가능함.) 
                        enabled : disabled의 counter - 활성화(입력가능 = 전송시 server저장가능)
                    -->
                    <!-- 
                        type 을 email로 설정하면, 모바일에서 해당 필드에 focus 되었을 때, 키보드를 열면서 영문과 @버튼이 생긴다. placeholder (ie10이하 지원불가)
                    -->
                </li>
                <li>
                    <label for="UserURL">웹사이트 :</label>
                    <input type="url" id="UserURL" required>
                    <!-- 
                        type 을 url로 설정하면, 모바일에서 해당 필드에 focus 되었을 떄, 키보드를 열면서 영문과 .com 버튼이 생기고 누르고 있으면 타 도메인으로 변경 가능
                    -->
                </li>
                <!-- 
                live server 다른장치 연결 방법

                1. 작업하는 컴퓨터와 확인하려는 장치가 같은 wifi에 접속되어 있어야 함.
                2. 컴퓨터에서 윈도우+R > cmd > ipconfig /all > ipv4 주소 > 크롬 접속 > ip주소:포트번호
                -->
                   <li>
                    <!-- (label[for='userPN']{전화번호:})+input:tel#userPN[placeholder='-를 뺀 숫자만 입력하세요.'] -->
                    <label for="userPN">전화번호:</label>
                    <input type="tel" id="userPN" placeholder="-를 뺀 숫자만 입력하세요.">
                    <!-- 
                        type을 tel로 설정하면 한줄로 전화번호 입력받는 양식 (-필수제외)
                        ! placeholder는 시각적정보만 담기 때문에 만약 label없이 사용할 경우 같은 내용의 title 필수.
                    -->
                </li>
                <li>
                    <label for="qty">수량 :</label>
                    <input type="number" id="qty" min="1" max="10" step="1" value="1">
                    <!--
                        상,하 버튼(스피너)으로 숫자를 기입하거나 입력받는 박스.
                            min : 최저 / max : 최대 / step : 상승값 / value : 초기값
                        절대 숫자입력 대용으로 사용하면 안됨. 반드시 수량 관련 부분에만 사용 할 것
                        -->
                </li>
                <li> 
                    <label for="sizeSet">사이즈 :</label>
                    <input type="range" id="sizeSet" min="250" max="280" step="10" value="250">
                    <!-- 슬라이드바로 범위 중 하나의 값을 선태갛ㄹ 수 있는 인풋 -->
                </li>
                <li>
                    <label for="typeDate">연,월,일 선택 :</label>
                    <input type="date" id="typeDate">
                </li>
                <li>
                    <label for="typeDateTime">연,월,일,시,분 선택 :</label>
                    <input type="datetime-local" id="typeDateTime">
                </li>
                <li>
                    <label for="typeTime">시간 선택 :</label>
                    <input type="time" id="typeTime">
                </li>
                <li>
                    <label for="typeMonth">월 선택 :</label>
                    <input type="month" id="typeMonth">
                </li>
                <li>
                    <label for="typeWeek">주 선택 :</label>
                    <input type="week" id="typeWeek">
                </li>
                <!-- input:date,datetime-local,time,month,week 는 i10 이하 지원 불가 (수동입력) -->
                <li>
                    <label for="searchField">검색 :</label>
                    <input type="search" id="searchField">
                    <!-- 
                        search는 검색어만 전문으로 입력받는 필드. x(자체리셋) 버튼이 조냊하고 자동완성기능(autocomplete)지원
                    -->
                </li>
                <li>
                    <label for="typeColor">색상선택 :</label>
                    <input type="color" id="typeColor">
                    <!-- 
                        color chip을 기준으로 대상을 찾게 해주는 인풋
                    -->
                </li>
            </ul>
            <input type="submit" value="전송">
            <input type="reset" value="취소">
        </fieldset>
    </form>

</body>
</html>
