<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragraph-문단태그</title>
</head>
<body>
    <!-- F1 > lipsum 검색 (or lipsum.com) 더미데이터 (임시용자료) -->
    <p>
        <b>진하게</b>
        <!-- b : bold 진하게 -->
        <strong>진하게</strong>
        <!-- 청각적 : 맨 앞의 글자에 강조를 함. 진!하게 스크린리더(청각장애인들이 쓰는 청각적 웹) -->
        <br>
        <!-- line-break : 개행태그. 이렇듯 기능(역할)을 수행하는 태그들은 markup형태가 아니다. 혼자만 쓴다! -->
        <i>기울기</i>
        <!-- i : 외국어, 분류적인 성격을 띄는 단어나 문장, 전문기술 용어, 손글씨 등등, 앞뒤 문맥과 구분되는 텍스트 -->
        <em>기울기</em>
        <!-- emphasized 청각적 : 성조를 바꿈 -->
        <br>
        <mark>색상강조</mark>
        <!-- 시각적 강조만 담당 / 청각적 강조는 없음! >> 그러니까 중요도가 너무 높은곳에는 쓰면 안됨 (글씨색, 배경색 등) -->
        <sup>위</sup>첨자
        <!-- superScript / Super,sub는 일반적인 사용이 엇고 대부분 화학, 수학, 생물학, 물리학 식등에서 사용된다 =- 빈도수 낮음 -->
        <sub>아래</sub>첨자<br>
        <!-- superScript -->
        <s>취소선</s>
        <!-- 실제 취소나 삭제를 의미하지는 않음 -->
        <del>취소선(실제data상 삭제)</del><br>
        <!-- 실제 취소 삭제를 의미함 / 쇼핑몰 할인되기 전 금액 같은거 표현할때 -->
        <u>밑줄</u><br>
        <!-- 주관적 기준에서는 강조가 될수있으나 객관적 기준에선느 강조가 아님  -->

        <!--<big>일부를 크게</big>표현해<br>
         사용할 수 없는 태그 / 사용 빈도수가 적어지거나 심각한 오류를 야기하는 태그는 사라질수있다 / 빅은 죽은태그... 쓰면 안되는... -->
        <small>일부를 작게</small>표현해<br>
        <!-- 같은 공간내에서 일부를 작게 표현해야 할때-->
    </p>
    <hr>
    <!-- hr(horizontal Rule) 단순한 수평선이 아니라 선을 기준으로 위, 아래 주제 자체가 바뀐다는 뜻 -->
    <blockquote>block상태 인용부</blockquote>
    <!-- 블럭은 태어나자마자 너비를 100으로 가짐.(걍 블럭이 잇으면 인라인 못올라옴) -->
    <q>인용문</q>
    <!-- 
        blockquote - display : block인 인용부분 (내부에 다량의 텍스트 및 구조를 소화할 수 있음)
        q (quote) - display : inline인 인용부분 (한 줄 분량의 인용문이기 떄문에 상위 구조에 포함되기 좋음 ex <p>)
    -->

 <!-- 문단 문단사이에 떨어져있는거 : 단간 / 글자 사이는 : 자간 / 단어와 단어사이도 단간 / 문단과 문단 사이는 붙을 수 없다 -->

 <!-- display : block; (위에서부터 떨어지는 태그들) > inline-block; > inline; (글자처럼 한줄로 쭉 있는) -->
