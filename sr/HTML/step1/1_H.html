<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML - Heading</title>
</head>
<body>
    <h1>Heading - 1</h1>
    <!-- 제일큼 > 제일 중요 > bi,ci logo -->
    <div>
        <h2>Heading - 2</h2>
        <!-- 그다음에 중요함 (페이지 자체의 제목(각섹션별 제목)/ 바디안에서 열리는 큰 공간단위-->
        <div>
            <h3>Heading - 3</h3>
            <!-- 위 큰 공간단위h2 단에 박스 단위의 제목 -->
            <div>
                <h4>Heading - 4</h4>
                <!-- 위 박스단위h3 안의 박스 단위의 제목 -->
                <div>
                    <h5>Heading - 5</h5>
                    <!-- 위 박스단위 안의 박스 단위의 제목/ 얘도 거의 안쓰임.... -->
                    <div>
                        <h6>Heading - 6</h6>
                        <!-- 위와 동일, 어찌저찌 쓰이는데.. 그 이하 사용이 어려움 -->
                    </div>
                </div>
            </div>
        </div>
    </div>
 <!-- 페이지업다운잘사용해보기 -->

</body>
</html>
