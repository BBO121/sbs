<!DOCTYPE html>
<html lang="en">

<body>
    <img src="images/file_example_JPG_2500kB.jpg" alt="노을진 창가의 탁자에 놓인 맥북에어" style="width: 100%;">
    <img src="https://placehold.co/300x150?text=alternateimages" alt="임시이미지공간">

    <p>
        alt(aleternaver Text) = 대체텍스트 <br>
        시각장애인들은 이미지를 볼 수 없기 때문에 이미지의 내용을 전달하기 위함. <br>
        안정화된 최대 자수는 255자 이내 권장. 이상 초과 될 경우 longdesc라는 attr이 있었으나 현재는 사용불가로 전환됨. <br>
        figure / figcaption tag를 사용해야함.
    </p>
    
    <!-- 
        경로 = Path = 파일이 있는 위치를 적는 방식

        절대 경로(A.Path = Absolute Path) - 현재 존재하는 소프트웨어적 최상위 기준으로 부터 시작하여 모든 경로를 기술하는 방식. (싹다 적기...)
            ex1. 컴퓨터 ::: c:/sr/HTML/step2/2_img.html 
            ex2. 웹 개발 환경 ::: /(root)HTML/step2/2_img.hhml
                root : 그 폴더의 가장 최상위 폴더 (지금 나는 SR 폴더)
            ex3. 고객 방문 환경 ::: DNS (ex> http://www.naver.com)/HTML/step2/2_img.html)
                DNS - Domain Naming Service의 약자 : 172.191.18.3:5500/index.nhn = 네이버 메인페이지 라면 DNS 변환시 https://www.naver.com

        상대 경로(R.Path = Relaive Path) - 현재 파일을 "불러오는 대상"의 위치로부터 "불러와지는 대상"의 위치까지만 기술
            ex1. 현재 img file 불러오기 > 같은 선상 (동위선상)에 있는 "images"폴더를 적고 안에 파일명만 적으면 끝
                "images/file_example_JPG_2500KB.jpg"
                단, 상위 폴더를 칭해야 할때 = "../" 한번 사용 할 때마다 한단계 상위 (html상에서는 사용되면 안됨!!!)
    -->

</html>
